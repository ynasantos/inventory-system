<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Archived Items</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Segoe UI,Arial,sans-serif}
    body{background:#008B3B;color:#111}
    .app{display:flex;min-height:100vh}

    .sidebar{width:250px;background:#D33551;color:#fff;display:flex;flex-direction:column;padding:20px}
    .brand{display:flex;gap:12px;align-items:center;margin-bottom:22px}
    .logo{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#111827}
    .logo img{width:100%;height:100%;object-fit:cover;object-position:center;display:block}
    .brand-title{font-size:18px;font-weight:900}
    .brand-sub{font-size:12px;opacity:.7}

    .nav{flex:1;margin-top:6px}
    .nav a{display:block;text-decoration:none;color:#cbd5e1;padding:12px 14px;border-radius:10px;margin-bottom:6px}
    .nav a:hover,.nav a.active{background:#f65a2e;color:#fff}

    .btn{border:0;border-radius:10px;padding:10px 14px;cursor:pointer;background:#2e8b57;color:#fff;font-weight:600}
    .btn-ghost{background:transparent;border:1px solid #374151;color:#cbd5e1;margin-top:10px}
    .sidebar-footer{margin-top:14px;font-size:12px;opacity:.85;line-height:1.4}

    .main{flex:1;padding:24px;background:#f5f5f5}
    .topbar{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:18px;gap:12px;flex-wrap:wrap}
    .page-title{font-size:24px;font-weight:900}
    .page-sub{font-size:13px;color:#6b7280;margin-top:4px}

    .card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 10px 20px rgba(0,0,0,.06)}
    .muted{color:#6b7280;font-size:14px;line-height:1.4}
    .danger{color:#dc2626;font-weight:800}

    input{padding:10px 12px;border:1px solid #e5e7eb;border-radius:10px;outline:none}
    input:focus{border-color:#93c5fd}

    table{width:100%;border-collapse:collapse;margin-top:12px}
    th,td{padding:10px;border-bottom:1px solid #eef2f7;text-align:left;font-size:14px;vertical-align:middle}
    th{font-size:12px;color:#6b7280}

    .action-menu{position:relative;display:inline-block}
    .dot-btn{
      width:34px;height:34px;border:1px solid #e5e7eb;border-radius:10px;
      background:#fff;color:#374151;cursor:pointer;font-size:20px;line-height:1
    }
    .dot-btn:hover{background:#f9fafb}
    .action-dropdown{
      position:absolute;right:0;top:40px;min-width:150px;background:#fff;border:1px solid #e5e7eb;
      border-radius:10px;box-shadow:0 10px 20px rgba(0,0,0,.08);padding:6px;z-index:20;display:none
    }
    .action-dropdown.show{display:block}
    .menu-item{
      width:100%;text-align:left;background:#fff;border:0;border-radius:8px;padding:9px 10px;cursor:pointer;
      color:#111827;font-size:13px
    }
    .menu-item:hover{background:#f3f4f6}
    .menu-item.danger{color:#b91c1c}

    .modal-backdrop{
      position:fixed;inset:0;background:rgba(17,24,39,.45);display:none;align-items:center;justify-content:center;
      z-index:50;padding:14px
    }
    .modal-backdrop.show{display:flex}
    .modal-card{background:#fff;border-radius:14px;padding:18px;max-width:420px;width:100%;box-shadow:0 20px 30px rgba(0,0,0,.2)}
    .modal-title{font-size:18px;font-weight:800;margin-bottom:12px}
    .modal-grid{display:flex;flex-direction:column;gap:10px}
    .modal-label{font-size:12px;color:#6b7280}
    .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:14px}
    .btn-cancel{background:#e5e7eb;color:#111827}
    .btn-danger{background:#b91c1c;color:#fff}

    @media (max-width: 900px){
      .sidebar{width:200px}
      .main{padding:16px}
    }
  </style>

  <script type="module" src="./js/archived.js?v=4"></script>
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">
          <img src="./images/kairo_logo_2.jpg" alt="Kairo System Logo">
        </div>
        <div>
          <div class="brand-title">Kairos</div>
          <div class="brand-sub">Publishing House</div>
        </div>
      </div>

      <nav class="nav">
        <a href="./dashboard.html">Dashboard</a>
        <a href="./inventory.html">Inventory</a>
        <a href="./sales.html">Sales</a>
        <a href="./reports.html">Reports</a>
        <a href="./history.html">History</a>
        <a class="active" href="./archived.html">Archived Items</a>
        <a id="navAdmin" href="./admin.html">Admin</a>
      </nav>

      <button class="btn btn-ghost" id="logoutBtn">Logout</button>

      <div class="sidebar-footer">
        Signed in as:<br>
        <strong id="userEmail">Loading…</strong><br>
        Role: <strong id="userRole">Loading…</strong>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <div class="page-title">Archived Items</div>
          <div class="page-sub">Restore products back to inventory</div>
        </div>

        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
          <input id="search" placeholder="Search archived product..." style="min-width:240px;">
          <button class="btn" id="refreshBtn">Refresh</button>
        </div>
      </header>

      <div class="card">
        <div class="muted" id="tableNote">Loading archived items…</div>
        <div class="muted" id="msg" style="margin-top:10px;"></div>
        <div class="danger" id="err" style="margin-top:8px;"></div>

        <table>
          <thead>
            <tr>
              <th>Product</th>
              <th>Price</th>
              <th>Min</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="archivedBody"></tbody>
        </table>
      </div>

      <div id="restoreModal" class="modal-backdrop">
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="restoreModalTitle">
          <div class="modal-title" id="restoreModalTitle">Restore Product</div>
          <div class="modal-grid">
            <div id="restoreModalText" class="muted"></div>
            <div>
              <div class="modal-label">Initial stock</div>
              <input id="restoreStockValue" type="number" min="0" step="1" />
            </div>
          </div>
          <div class="modal-actions">
            <button class="btn btn-cancel" id="restoreCancelBtn" type="button">Cancel</button>
            <button class="btn" id="restoreConfirmBtn" type="button">Restore</button>
          </div>
        </div>
      </div>

      <div id="deleteModal" class="modal-backdrop">
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle">
          <div class="modal-title" id="deleteModalTitle">Delete Product</div>
          <div id="deleteModalText" class="muted">This cannot be undone.</div>
          <div class="modal-actions">
            <button class="btn btn-cancel" id="deleteCancelBtn" type="button">Cancel</button>
            <button class="btn btn-danger" id="deleteConfirmBtn" type="button">Delete</button>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
