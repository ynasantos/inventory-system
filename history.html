<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>History</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Segoe UI,Arial,sans-serif}
    body{background:#008B3B;color:#111}
    .app{display:flex;min-height:100vh}

    .sidebar{width:250px;background:#D32F2F;color:#fff;display:flex;flex-direction:column;padding:20px}
    .brand{display:flex;gap:12px;align-items:center;margin-bottom:22px}

    .logo{
      width:42px;
      height:42px;
      border-radius:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .logo img{
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center;
    }

    .brand-title{font-size:18px;font-weight:900}
    .brand-sub{font-size:12px;opacity:.7}

    .nav{flex:1;margin-top:6px}
    .nav a{display:block;text-decoration:none;color:#cbd5e1;padding:12px 14px;border-radius:10px;margin-bottom:6px}
    .nav a:hover,.nav a.active{background:#B71C1C;color:#fff}

    html.role-staff #navDashboard,
    html.role-staff #navInventory,
    html.role-staff #navReports,
    html.role-staff #clearBtn,
    html.role-staff #navAdmin,
    html.role-user #navAdmin { display:none !important; }

    html.role-admin #navAdmin { display:block !important; }

    .btn{border:0;border-radius:10px;padding:10px 14px;cursor:pointer;background:#2e8b57;color:#fff;font-weight:600}
    .btn-ghost{background:transparent;border:1px solid #374151;color:#cbd5e1;margin-top:10px}

    .sidebar-footer{margin-top:14px;font-size:12px;opacity:.85;line-height:1.4}

    .main{flex:1;padding:24px;background:#F5E6C8}
    .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:12px;flex-wrap:wrap}
    .page-title{font-size:24px;font-weight:900}
    .page-sub{font-size:13px;color:#6b7280;margin-top:4px}

    .card{background:#F9F5EC;border-radius:14px;padding:18px;box-shadow:0 10px 20px rgba(0,0,0,.1)}
    .muted{color:#6b7280;font-size:14px;line-height:1.4}

    table{width:100%;border-collapse:collapse;margin-top:12px}
    th,td{padding:10px;border-bottom:1px solid #eef2f7;text-align:left;font-size:14px;vertical-align:middle}
    th{font-size:12px;color:#6b7280}

    input{padding:10px 12px;border:1px solid #e5e7eb;border-radius:10px;outline:none}
    input:focus{border-color:#93c5fd}

    .modal-backdrop{
      position:fixed;inset:0;background:rgba(17,24,39,.45);display:none;align-items:center;justify-content:center;
      z-index:50;padding:14px
    }
    .modal-backdrop.show{display:flex}
    .modal-card{background:#fff;border-radius:14px;padding:18px;max-width:420px;width:100%;box-shadow:0 20px 30px rgba(0,0,0,.2)}
    .modal-title{font-size:18px;font-weight:800;margin-bottom:12px}
    .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:14px}
    .btn-cancel{background:#e5e7eb;color:#111827}
    .btn-danger{background:#b91c1c;color:#fff}

    @media (max-width: 900px){
      .sidebar{width:200px}
      .main{padding:16px}
    }
     /* Burger button */
    .burger {
      width: 34px;
      height: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }
    .burger span {
      height: 4px;
      width: 100%;
      background: #2e8b57;
      border-radius: 2px;
      transition: 0.3s;
    }

    /* Close button inside sidebar */
    .close-sidebar {
      background: none;
      border: none;
      color: #fff;
      font-size: 26px;
      cursor: pointer;
      align-self: flex-end;
      margin-bottom: 10px;
    }

    /* Sidebar responsive behavior */
    @media (max-width: 900px){
      .sidebar{width:250px;position:fixed;left:-250px;top:0;height:100%;transition:left 0.3s ease;z-index:999}
      .sidebar.show{left:0}
      .main{padding:16px}
    }
  </style>

  <script>
    (function () {
      const role = String(localStorage.getItem("kairo_role") || "").trim().toLowerCase();
      if (role === "admin") {
        document.documentElement.classList.add("role-admin");
      } else if (role === "staff") {
        document.documentElement.classList.add("role-staff");
      } else if (role) {
        document.documentElement.classList.add("role-user");
      }
    })();
  </script>
  <script type="module" src="./js/history.js?v=8"></script>
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <button id="closeSidebarBtn" class="close-sidebar">&times;</button>
      <div class="brand">
        <div class="logo">
          <img src="./images/Kairos Logo.png" alt="Kairo System Logo">
        </div>
        <div>
          <div class="brand-title">Kairos</div>
          <div class="brand-sub">Publishing House</div>
        </div>
      </div>

      <nav class="nav">
        <a id="navDashboard" href="./dashboard.html">Dashboard</a>
        <a id="navInventory" href="./inventory.html">Inventory</a>
        <a href="./sales.html">Sales</a>
        <a id="navReports" href="./reports.html">Reports</a>
        <a class="active" href="./history.html">History</a>
        <a id="navAdmin" href="./admin.html" style="display:none;">Admin</a>
      </nav>

      <button class="btn btn-ghost" id="logoutBtn">Logout</button>

      <div class="sidebar-footer">
        Signed in as:<br>
        <strong id="userEmail">Loading…</strong><br>
        Role: <strong id="userRole">Loading…</strong>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <div class="page-title">Transaction History</div>
          <div class="page-sub">View completed sales transactions</div>
        </div>

        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
          <input id="search" placeholder="Search product..." style="min-width:240px;" />
          <button class="btn" id="clearBtn" type="button">Clear</button>
          <button class="btn" id="refreshBtn">Refresh</button>
                    <!-- Burger button -->
          <button id="burgerBtn" class="burger">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </header>

      <div class="card">
        <div class="muted" id="note">Loading transactions…</div>

        <table>
          <thead>
            <tr>
              <th>Product</th>
              <th>Total</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>

      <div id="clearModal" class="modal-backdrop">
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="clearModalTitle">
          <div class="modal-title" id="clearModalTitle">Clear History</div>
          <div id="clearModalText" class="muted">Clear transaction history? This cannot be undone.</div>
          <div class="modal-actions">
            <button class="btn btn-cancel" id="clearCancelBtn" type="button">Cancel</button>
            <button class="btn btn-danger" id="clearConfirmBtn" type="button">Clear</button>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script>
    const burgerBtn = document.getElementById("burgerBtn");
    const sidebar = document.querySelector(".sidebar");
    const closeSidebarBtn = document.getElementById("closeSidebarBtn");

    burgerBtn.addEventListener("click", () => {
      sidebar.classList.toggle("show");
    });

    closeSidebarBtn.addEventListener("click", () => {
      sidebar.classList.remove("show");
    });
</script>
</body>
</html>
