<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign In</title>
  <!-- Import fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Open+Sans&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Open Sans', sans-serif;
      background: url('images/kairos_bg.jpg') no-repeat center center fixed;
      background-size: cover;
    }

    /* Login card */
    .login-container {
      margin: 5% auto;
      width: 100%;
      max-width: 800px;
      background-color: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(1px);
      border-radius: 18px;
      padding: 0px;
      border: 1px solid var(--border);
    }

    /* Top bar with centered logo */
    .card-header {
      background: linear-gradient(to right, #c62828 50%, #388e3c 50%);
      height: 50px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-header img {
      height: 70px;
      margin-top: 50px;
    }

    /* Card body */
    .card-body {
      padding: 30px;
      text-align: center;
    }

    .card-body h1 {
      margin: 0 0 6px;
      margin-top: 5%;
      text-align: center;
      font-size: 22px;
      font-weight: 600;
      font-family: 'Merriweather', serif;
    }

    .card-body p {
      margin-bottom: 24px;
      text-align: center;
      font-size: 14px;
      color: var(--muted);
      font-family: 'Open Sans', sans-serif;
    }

    .card-body input {
      width: 75%;
      padding: 12px 14px;
      margin-bottom: 18px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 14px;
      outline: none;
    }

    .card-body a {
      display: block;
      margin: 10px 0;
      font-size: 13px;
      color: #0077cc;
      text-decoration: none;
    }

    .card-body a:hover {
      text-decoration: underline;
    }

    .card-body button {
      display: block;
      margin: 15px auto 0; 
      width: 20%;
      padding: 12px;
      margin-top: 20px;
      border-radius: 20px;
      border: none;
      background: #e74c3c;
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .card-body button:hover {
      opacity: 0.92;
    }
  </style>
</head>
<body>

  <!-- Login card -->
  <div class="login-container">
    <!-- Header with centered logo -->
    <div class="card-header">
      <img src="images/KPH_logo.png" alt="KPH Logo">
    </div>

    <!-- Card body -->
    <div class="card-body">
      <h1>KAIROS PUBLISHING HOUSE</h1>
      <p>Welcome!</p>
      <form id="loginForm">
        <label for="email"></label>
        <input id="email" placeholder="Email" required>
        <label for="password"></label>
        <input id="password" placeholder="Password" required>
        <button type="submit">Sign In</button>
      </form>
    </div>
  </div>

    <!-- IMPORTANT -->
    <script type="module" src="js/auth.js"></script>
</body>
</html>
